<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment #5 - Forms</title>
  <link rel="icon" type="image/png" href="favicon.ico">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container mt-5">
    <h1 class="text-center mb-4">Forms and Validation</h1>

    <section class="mb-5">
      <h2>Part 1. Basic HTML Form</h2>
      <form>
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Message</label>
          <textarea class="form-control" rows="3" required></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" minlength="6" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" minlength="6" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Gender</label><br>
          <input type="radio" name="gender" required> Male
          <input type="radio" name="gender"> Female
        </div>

        <div class="mb-3">
          <label class="form-label">Hobbies</label><br>
          <input type="checkbox"> Dancing
          <input type="checkbox"> Reading
          <input type="checkbox"> Crafts
        </div>

        <div class="mb-3">
          <label class="form-label">Country</label>
          <select class="form-select" required>
            <option value="">Choose...</option>
            <option>Kazakhstan</option>
            <option>USA</option>
            <option>Japan</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
        <button type="reset" class="btn btn-secondary">Reset</button>
      </form>
    </section>

    <section>
      <h2>Part 2. Bootstrap Validation</h2>
      <form class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Name</label>
          <input type="text" class="form-control is-invalid" required>
          <div class="invalid-feedback">Name is required</div>
        </div>

        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" class="form-control is-valid" required>
          <div class="valid-feedback">Good!</div>
        </div>

        <div class="col-12">
          <label class="form-label">Message</label>
          <textarea class="form-control is-invalid" required></textarea>
          <div class="invalid-feedback">Message cannot be empty</div>
        </div>

        <div class="col-12">
          <button class="btn btn-success" type="submit">Submit</button>
        </div>
      </form>
    </section>
  </div>
</body>

</html>
